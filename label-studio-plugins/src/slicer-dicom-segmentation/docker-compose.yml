version: '3.8'

services:
  slicer-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DISPLAY=:99
      - SLICER_NO_OPENGL_TEST=1
    volumes:
      - ./test-data:/app/test-data
      - slicer-temp:/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  slicer-temp:
