title: Video Object Tracking
type: community
group: Videos
image: /static/templates/video-object-tracking.png
details: |
  <h1>Object tracking in video with bounding boxes</h1>
  <!-- keywords: ["autonomous driving", "surveillance systems", "sports analytics", "robotics", "augmented reality", "traffic monitoring", "security cameras", "wildlife tracking", "retail analytics", "medical imaging", "motion analysis", "behavior analysis", "industrial automation", "drone surveillance", "SORT", "DeepSORT", "ByteTrack", "FairMOT", "CenterTrack", "Kalman filter", "multi-object tracking", "MOT", "object detection", "temporal consistency", "trajectory analysis"] -->
config: |
  <View>
     <Labels name="videoLabels" toName="video" allowEmpty="true">
       <Label value="Man" background="blue"/>
       <Label value="Woman" background="red"/>
       <Label value="Other" background="green"/>
     </Labels>
     
     <!-- Please specify FPS carefully, it will be used for all project videos -->
     <Video name="video" value="$video" framerate="25.0"/>
     <VideoRectangle name="box" toName="video" />
  </View>

