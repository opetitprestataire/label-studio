title: Change Point Detection
type: community
group: Time Series Analysis
image: /static/templates/change-point-detection.png
details: |
  <h1>Identify changing points on time series signals</h1>
  <!-- keywords: ["financial market analysis", "climate data analysis", "medical signal analysis", "manufacturing process control", "energy consumption monitoring", "network traffic analysis", "supply chain optimization", "economic forecasting", "epidemiological studies", "quality assurance", "system performance monitoring", "behavioral analysis", "PELT", "CUSUM", "Bayesian change point detection", "segmentation algorithms", "structural breaks", "regime change", "trend analysis", "segmentation", "temporal boundaries"] -->
config: |
  <View>
      <!-- Control tag for region labels -->
      <TimeSeriesLabels name="label" toName="ts">
          <Label value="Change" background="red" />
      </TimeSeriesLabels>

      <!-- Object tag for time series data source -->
      <TimeSeries name="ts" valueType="url" value="$csv"
                  sep=","
                  timeColumn="time"
                  timeFormat="%Y-%m-%d %H:%M:%S.%f"
                  timeDisplayFormat="%Y-%m-%d"
                  overviewChannels="velocity">

          <Channel column="velocity"
                   units="miles/h"
                   displayFormat=",.1f"
                   strokeColor="#1f77b4"
                   legend="Velocity"/>
      </TimeSeries>
  </View>

